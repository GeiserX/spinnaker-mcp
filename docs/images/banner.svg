<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <rect x="0" y="186" width="900" height="4" rx="2" fill="url(#accent)" opacity="0.8"/>
  <!-- Spinnaker triangle -->
  <g transform="translate(100, 100)">
    <polygon points="0,-45 39,22.5 -39,22.5" fill="none" stroke="#e94560" stroke-width="3" opacity="0.9"/>
    <polygon points="0,-30 26,15 -26,15" fill="none" stroke="#533483" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="-2" r="6" fill="#e94560" opacity="0.8"/>
  </g>
  <!-- Title -->
  <text x="200" y="95" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">Spinnaker-MCP</text>
  <!-- Subtitle -->
  <text x="200" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#a0a0b8">Spinnaker Gate API as an MCP server</text>
  <!-- MCP badge -->
  <rect x="200" y="145" width="56" height="22" rx="4" fill="#e94560" opacity="0.15"/>
  <text x="228" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#e94560" text-anchor="middle" font-weight="600">MCP v1</text>
  <!-- Go badge -->
  <rect x="266" y="145" width="40" height="22" rx="4" fill="#00ADD8" opacity="0.15"/>
  <text x="286" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#00ADD8" text-anchor="middle" font-weight="600">Go</text>
  <!-- Connection lines -->
  <g opacity="0.15" stroke="#ffffff" stroke-width="1">
    <line x1="160" y1="60" x2="195" y2="80"/>
    <line x1="160" y1="140" x2="195" y2="125"/>
  </g>
</svg>
